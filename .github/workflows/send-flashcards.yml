name: Send English Vocabulary Flashcards

on:
  schedule:
    - cron: "0,5 1 * * *"
    - cron: "0,5 5 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Thailand schedule slot"
        required: true
        default: "08:00"
        type: choice
        options:
          - "08:00"
          - "12:00"
          - "test"

permissions:
  contents: write

concurrency:
  group: english-vocab-flashcards-state
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"

      - name: Verify Playwright browser install
        run: npx playwright --version

      - name: Resolve schedule slot
        id: slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            case "${{ github.event.schedule }}" in
              "0,5 1 * * *"|"0 1 * * *"|"5 1 * * *")
                echo "slot=08:00" >> "$GITHUB_OUTPUT"
                ;;
              "0,5 5 * * *"|"0 5 * * *"|"5 5 * * *")
                echo "slot=12:00" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::Unknown schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          else
            echo "slot=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send flashcards test
        if: steps.slot.outputs.slot == 'test'
        run: npm run send:test
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Send flashcards
        if: steps.slot.outputs.slot != 'test'
        run: npm run schedule:run -- --slot "${{ steps.slot.outputs.slot }}"
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TARGET_ID: ${{ secrets.LINE_TARGET_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Verify only safe state changes can be committed
        if: steps.slot.outputs.slot != 'test'
        shell: bash
        run: |
          git status --short
          if [[ -f .env ]]; then
            echo "::error::.env exists in the workflow workspace; refusing to continue."
            exit 1
          fi
          unsafe_changes="$(git status --porcelain | grep -v '^ M storage/state.json$' | grep -v '^M  storage/state.json$' || true)"
          if [[ -n "$unsafe_changes" ]]; then
            echo "::error::Unexpected file changes detected:"
            echo "$unsafe_changes"
            exit 1
          fi

      - name: Commit state update
        if: steps.slot.outputs.slot != 'test'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add storage/state.json
          git diff --cached --quiet || git commit -m "Update flashcard send state"
          git push
