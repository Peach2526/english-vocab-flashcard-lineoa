<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{CATEGORY_LABEL}} - {{WORD}}</title>
    <style>
      {{CSS}}
    </style>
  </head>
  <body>
    <main class="flashcard">
      <section class="topbar">
        <div class="category">{{CATEGORY_LABEL}}</div>
        <div class="slot">{{SLOT}} Asia/Bangkok</div>
      </section>

      <section class="content">
        <div class="icon-panel">
          <div class="icon-ring">
            <div class="icon">{{ICON}}</div>
          </div>
        </div>

        <div class="word-panel">
          <h1>{{WORD}}</h1>
          <div class="meta">
            <span>{{PRONUNCIATION}}</span>
            <span>{{PART_OF_SPEECH}}</span>
          </div>
          <div class="meaning">{{THAI_MEANING}}</div>
        </div>
      </section>

      <section class="example">
        <div class="example-label">Example</div>
        <p class="english">{{EXAMPLE}}</p>
        <p class="thai">{{EXAMPLE_THAI}}</p>
      </section>
    </main>
  </body>
</html>
